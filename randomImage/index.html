<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Image Gallery</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #f4f6f9;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    /* Grid */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
    }

    /* Button */
    button {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <h1>Random Images 🔥</h1>

  <div class="container" id="gallery"></div>

  <button id="loadMore">Load More</button>

  <script>
    const accessKey = "S-a_WUa3mVQp6DIEo5LIwRFVD5eF-PnfwtfqZuUm-PU";
    const gallery = document.getElementById("gallery");
    const loadMoreBtn = document.getElementById("loadMore");

    // Function to load random images
    async function loadImages() {
      const res = await fetch(`https://api.unsplash.com/photos/random?count=12&client_id=${accessKey}`);
      const data = await res.json();

      data.forEach(photo => {
        const div = document.createElement("div");
        div.classList.add("card");

        div.innerHTML = `
      <img src="${photo.urls.small}" />
      <p>By ${photo.user.name}</p>
    `;

        gallery.appendChild(div);
      });
    }

    // Page load pe images aayengi
    window.addEventListener("load", loadImages);

    // Load more button
    loadMoreBtn.addEventListener("click", loadImages);
  </script>

</body>

</html>
